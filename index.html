<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="てのひら">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="話しかけるだけ。AIがあなたに必要なものを見つけます。">
<title>てのひら AI</title>
<style>
:root {
  --bg: #1a1a1a;
  --surface: #2a2a2a;
  --surface2: #333333;
  --border: #2a2a2a;
  --border2: #3a3a3a;
  --text: #e0e0e0;
  --text-sub: #a0a0a0;
  --text-dim: #888888;
  --primary: #2e9e7c;
  --primary-dark: #1e7a5e;
  --primary-glow: rgba(46,158,124,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 20px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  overflow: hidden;
}
button { cursor: pointer; font-family: inherit; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 5;
}

/* ===== サイドバー ===== */
#sidebar {
  width: 260px;
  background: #111;
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.25s ease;
  z-index: 10;
  padding-top: env(safe-area-inset-top);
}
#sb-header {
  padding: 16px 14px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}
#sb-logo { font-size: 22px; font-weight: 600; color: var(--text); }
.icon-btn {
  background: none;
  border: none;
  color: var(--text-sub);
  font-size: 24px;
  padding: 8px 12px; /* ★タップしやすいようにボタンの反応エリアを広く */
  border-radius: 6px;
  transition: background 0.15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { background: var(--surface); color: var(--text); }
#sb-nav { padding: 6px 8px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-sub);
  transition: all 0.15s;
}
.nav-item:hover { background: var(--surface); color: var(--text); }

.section-label {
  padding: 20px 16px 10px;
  font-size: 18px;
  color: #ffffff;
  letter-spacing: 0.05em;
  font-weight: bold;
  border-top: 0.5px solid var(--border);
  margin-top: 10px;
}

#hist-list { flex: 1; overflow-y: auto; padding: 4px 8px; }

.hist-item {
  padding: 14px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 19px;
  color: var(--text-sub);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.15s;
  display: flex;
  align-items: center;
}
.hist-item:hover { background: var(--surface); color: var(--text); }
.hist-item.active { background: var(--surface); color: var(--text); font-weight: 600; }

#sb-footer {
  padding: 10px 8px;
  border-top: 0.5px solid var(--border);
}
#user-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
}
#user-row:hover { background: var(--surface); }
.user-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
#user-name { font-size: 16px; color: #777; flex: 1; }

/* ===== メイン ===== */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ★トップバー：ボタンがバリアに埋もれないように構造を修正 */
#top-bar {
  /* 内側の上の余白にiPhoneの安全地帯（時計の高さ）を足す */
  padding-top: calc(12px + env(safe-area-inset-top));
  padding-bottom: 12px;
  padding-left: 14px;
  padding-right: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
  position: relative;
  z-index: 2; /* ★ボタンを一番手前に持ってきてタップできるように変更 */
}
#top-title { flex: 1; text-align: center; font-size: 17px; color: var(--text-sub); }
#model-badge {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  color: var(--text-sub);
}

/* チャットエリア */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ウェルカム */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 20px;
  text-align: center;
}
#welcome-logo { font-size: 56px; animation: float 4s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
#welcome-title { font-size: 26px; font-weight: 600; }
#welcome-sub { font-size: 18px; color: #666; line-height: 1.7; }
#chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 12px 22px;
  font-size: 18px;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { border-color: var(--primary); color: var(--text); }

/* メッセージ */
.msg-row { display: flex; gap: 12px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.msg-avatar.ai { background: var(--primary); }
.msg-avatar.user { background: #333; }
.msg-bubble {
  max-width: 82%;
  padding: 14px 18px;
  border-radius: 18px;
  font-size: 18px;
  line-height: 1.85;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-bubble.ai { background: var(--surface); color: var(--text); border-radius: 4px 12px 12px 12px; }
.msg-bubble.user { background: #2e3a36; color: var(--text); border-radius: 12px 4px 12px 12px; }

/* タイピング */
.typing-bubble {
  padding: 12px 16px;
  border-radius: 4px 12px 12px 12px;
  background: var(--surface);
  display: flex; gap: 5px; align-items: center;
}
.t-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
  animation: tdot 1.2s infinite;
}
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

/* カードリスト */
.card-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
.app-card {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 16px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.app-card:hover { opacity: 0.85; }
.app-card.primary {
  background: #1a2e26;
  border: 1.5px solid var(--primary);
  box-shadow: 0 0 0 1px var(--primary-glow), 0 4px 20px var(--primary-glow);
}
.card-icon { font-size: 32px; flex-shrink: 0; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.card-desc { font-size: 14px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-arrow { color: var(--primary); font-size: 22px; flex-shrink: 0; }

/* 入力エリア */
#input-area {
  padding: 10px 14px 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
}
#input-wrap {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 16px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#input-wrap:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
#main-input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 18px;
  font-family: inherit;
  resize: none;
  line-height: 1.6;
  width: 100%;
  max-height: 140px;
  overflow-y: auto;
}
#main-input::placeholder { color: var(--text-dim); }
#input-actions { display: flex; align-items: center; justify-content: space-between; }
#input-left { display: flex; gap: 6px; align-items: center; }
#input-model { background: var(--bg); border: 0.5px solid #333; border-radius: 10px; padding: 5px 12px; font-size: 13px; color: #555; }
#send-btn {
  background: var(--primary);
  border: none;
  color: #fff;
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: background 0.15s;
  box-shadow: 0 2px 8px var(--primary-glow);
}
#send-btn:hover { background: var(--primary-dark); }
#send-btn:disabled { background: var(--surface2); box-shadow: none; cursor: not-allowed; color: var(--text-dim); }

/* モバイル対応 */
@media (max-width: 640px) {
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
  }
  #sidebar.open { transform: translateX(0); }
  #overlay.show { display: block; }
}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sb-header">
    <div id="sb-logo">🐱 てのひら</div>
    <button class="icon-btn" onclick="newChat()" title="新しいチャット">✏️</button>
  </div>

  <div id="sb-nav">
    <div class="nav-item">💬 チャット</div>
    <div class="nav-item">📁 プロジェクト</div>
    <div class="nav-item">🔔 通知</div>
  </div>

  <div class="section-label">最近の会話</div>
  <div id="hist-list"></div>

  <div id="sb-footer">
    <div id="user-row">
      <div class="user-avatar">M</div>
      <div id="user-name">mahitogawa</div>
      <button class="icon-btn">⚙️</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="top-bar">
    <button class="icon-btn" onclick="toggleSidebar()">☰</button>
    <div id="top-title">てのひら AI</div>
    <div id="model-badge">✨ Workers AI</div>
  </div>

  <div id="chat-area">
    <div id="welcome">
      <div id="welcome-logo">🐱</div>
      <div id="welcome-title">なんでも話しかけてにゃ</div>
