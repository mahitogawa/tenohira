<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TENOHIRA">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="話しかけるだけ。AIがあなたに必要なものを見つけます。">
<title>TENOHIRA AI</title>
<style>
:root {
  --bg: #1a1a1a;
  --surface: #2a2a2a;
  --surface2: #333333;
  --border: #2a2a2a;
  --border2: #3a3a3a;
  --text: #e0e0e0;
  --text-sub: #a0a0a0;
  --text-dim: #555;
  --primary: #2e9e7c;
  --primary-dark: #1e7a5e;
  --primary-glow: rgba(46,158,124,0.2);
  --danger: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
html { font-size: 24px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  position: relative;
}
button { cursor: pointer; font-family: inherit; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}
#overlay.show { display: block; }

/* ===== サイドバー ===== */
#sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 320px;
  background: #111;
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  padding-top: env(safe-area-inset-top);
  transform: translateX(-325px);
  transition: transform 0.2s ease-out;
}
#sidebar.open { transform: translateX(0); }

@media (min-width: 769px) {
  #sidebar { position: relative; transform: translateX(0); width: 340px; }
  #overlay.show { display: none; }
}

#sb-header {
  padding: 16px 14px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}
#sb-logo { font-size: 24px; font-weight: 600; color: var(--text); }
.icon-btn {
  background: none;
  border: none;
  color: var(--text-sub);
  font-size: 26px;
  padding: 8px 12px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { background: var(--surface); color: var(--text); }
#sb-nav { padding: 6px 8px; }
.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 20px;
  color: var(--text-sub);
}
.nav-item:hover, .nav-item.active { background: var(--surface); color: var(--text); }
.nav-item.active { border-left: 4px solid var(--primary); font-weight: bold; }

.nav-click-area { display: flex; align-items: center; gap: 10px; flex: 1; height: 100%; }
.add-chat-btn { background: none; border: none; color: var(--text-sub); font-size: 24px; padding: 2px 12px; border-radius: 6px; font-weight: bold; }
.add-chat-btn:hover { background: var(--surface2); color: var(--primary); }

.section-label {
  padding: 20px 16px 10px;
  font-size: 16px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  font-weight: bold;
  border-top: 0.5px solid var(--border);
  margin-top: 10px;
}

#hist-list { flex: 1; overflow-y: auto; padding: 4px 8px; }

.hist-item {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 20px;
  color: var(--text-sub);
  margin-bottom: 6px;
}
.hist-item:hover { background: var(--surface); color: var(--text); }
.hist-item.active { background: var(--surface); color: var(--text); font-weight: 600; border-left: 4px solid var(--primary); }
.hist-txt { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; }

.del-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  padding: 4px 6px;
  border-radius: 4px;
}
.hist-item:hover .del-btn { display: block; }
.del-btn:hover { color: var(--danger); background: var(--surface2); }

#sb-footer { padding: 10px 8px; border-top: 0.5px solid var(--border); }
#user-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0; }
#user-name { font-size: 18px; color: #777; flex: 1; }

/* ===== メイン画面 ===== */
#main { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; min-width: 0; }

#top-bar {
  padding-top: calc(14px + env(safe-area-inset-top));
  padding-bottom: 14px;
  padding-left: 16px;
  padding-right: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
#top-title { flex: 1; text-align: center; font-size: 20px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
#model-badge { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; padding: 6px 12px; font-size: 15px; color: var(--text-sub); }

#chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

/* ===== TOP（ウェルカム）画面 ===== */
#welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 24px; text-align: center; width: 100%; }
#welcome-logo { font-size: 72px; animation: float 4s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
#welcome-title { font-size: 32px; font-weight: 700; color: var(--text); line-height: 1.3; }
#welcome-sub { font-size: 20px; color: var(--text-sub); line-height: 1.8; }
#chips { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 480px; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 14px 24px;
  font-size: 20px;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.chip:active { background: var(--surface2); border-color: var(--primary); color: var(--primary); }

/* ===== メッセージ ===== */
.msg-row { display: flex; gap: 14px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.msg-avatar.ai { background: var(--primary); }
.msg-avatar.user { background: #333; }
.msg-bubble { max-width: 85%; padding: 16px 20px; border-radius: 20px; font-size: 22px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
.msg-bubble.ai { background: var(--surface); color: var(--text); border-radius: 4px 18px 18px 18px; }
.msg-bubble.user { background: #2e3a36; color: var(--text); border-radius: 18px 4px 18px 18px; }

/* タイピング */
.typing-bubble { padding: 16px 20px; border-radius: 4px 18px 18px 18px; background: var(--surface); display: flex; gap: 6px; align-items: center; }
.t-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: tdot 1.2s infinite; }
.t-dot:nth-child(2){animation-delay:.2s} .t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

/* ===== カードUI ===== */
.card-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; width: 100%; max-width: 85%; }
.app-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 18px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; text-decoration: none; transition: opacity 0.15s; -webkit-tap-highlight-color: transparent; }
.app-card:active { opacity: 0.75; }
.app-card.primary { background: #1a2e26; border: 1.5px solid var(--primary); box-shadow: 0 0 0 1px var(--primary-glow); }
.card-icon { font-size: 36px; flex-shrink: 0; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.card-desc { font-size: 16px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-arrow { color: var(--primary); font-size: 26px; flex-shrink: 0; }

/* ===== タスク・通知パネル ===== */
.panel-title { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
.panel-card { background: var(--surface); border: 1px solid var(--border2); padding: 20px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 14px; }
.panel-card-text { font-size: 22px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.5; }
.panel-btn { background: none; border: none; color: var(--text-sub); font-size: 24px; padding: 8px; border-radius: 6px; flex-shrink: 0; }
.panel-btn:active { color: var(--danger); background: var(--surface2); }
.panel-empty { color: var(--text-dim); font-size: 20px; padding: 24px 0; text-align: center; }

.quick-link-title { font-size: 24px; font-weight: 700; color: var(--primary); margin: 28px 0 14px; }

.add-box { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 600px; }
.add-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  color: var(--text);
  padding: 14px 16px;
  font-size: 20px;
  font-family: inherit;
  outline: none;
}
.add-input:focus { border-color: var(--primary); }
.add-submit { background: var(--primary); border: none; color: #fff; padding: 14px 24px; border-radius: 12px; font-size: 20px; font-weight: 700; font-family: inherit; }

/* ===== 入力エリア（safe-area修正） ===== */
#input-area {
  padding: 12px 16px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
#input-wrap { background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
#input-wrap:focus-within { border-color: var(--primary); }
#main-input { background: none; border: none; outline: none; color: var(--text); font-size: 22px; font-family: inherit; resize: none; line-height: 1.6; width: 100%; max-height: 160px; overflow-y: auto; }
#main-input::placeholder { color: #555; }
#input-actions { display: flex; align-items: center; justify-content: space-between; }
#input-left { display: flex; gap: 8px; align-items: center; }
#input-model { background: var(--bg); border: 0.5px solid #333; border-radius: 10px; padding: 6px 14px; font-size: 15px; color: #555; }
#send-btn { background: var(--primary); border: none; color: #fff; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 2px 8px var(--primary-glow); }
#send-btn:disabled { background: var(--surface2); cursor: not-allowed; color: #555; box-shadow: none; }
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sb-header">
    <div id="sb-logo" onclick="newChat()" style="cursor:pointer;">🐱 TENOHIRA</div>
  </div>
  <div id="sb-nav">
    <div class="nav-item active" id="nav-chat">
      <div class="nav-click-area" onclick="switchNav('chat')">💬 チャット</div>
      <button class="add-chat-btn" onclick="newChat()" title="新規チャット">＋</button>
    </div>
    <div class="nav-item" id="nav-project" onclick="switchNav('project')">
      <div class="nav-click-area" onclick="switchNav('project')">📁 タスク/計画</div>
    </div>
    <div class="nav-item" id="nav-notify" onclick="switchNav('notify')">
      <div class="nav-click-area" onclick="switchNav('notify')">🔔 通知板</div>
    </div>
  </div>
  <div class="section-label">最近の会話</div>

      <div class="user-avatar">M</div>
      <div id="user-name">mahitogawa</div>

  </div>
</div>

<div id="main">
  <div id="top-bar">
    <button class="icon-btn" onclick="toggleSidebar()">☰</button>
    <div id="top-title">TENOHIRA AI</div>
    <div id="model-badge">✨ Workers AI</div>
  </div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="main-input" rows="1" placeholder="なんでも話しかけてにゃ…"></textarea>
      <div id="input-actions">
        <div id="input-left">
          <button class="icon-btn" id="btn-mic" title="音声入力">🎤</button>

      </div>

</div>

<script>
const WORKER_URL = 'https://tenohira.mahito-ai.workers.dev';

const APPS = {
  moushitate: { icon:'📝', title:'障害年金 申立書AI',  desc:'聞き取りながら障害年金の申立書を一緒に作ります', url:'https://mahitogawa.github.io/ai/moushitate-ai.html' },
  nyanlog:    { icon:'🐱', title:'にゃんログ',          desc:'毎日の気分・お薬・症状を記録して受診に活かします', url:'https://mahitogawa.github.io/nyanlog/' },
  tenohira:   { icon:'🤲', title:'てのひら福祉相談',    desc:'福祉サービス・手当・申請についてAIが相談に乗ります', url:'https://mahitogawa.github.io/tenohira/' },
  mental:     { icon:'💙', title:'こころのセルフチェック', desc:'症状から気になる病気を参考表示します', url:'https://mahitogawa.github.io/nyanlog/mental.html' },
  passport:   { icon:'📚', title:'生成AIパスポート対策', desc:'462問の練習問題でAI資格試験を準備します', url:'https://mahitogawa.github.io/ai/' },
};

// ===== STATE MACHINE =====
// domain: nenkin | fukushi | health | daily | general | null
// state:  initial → hearing → record → workflow
// urgency: high | normal | low
// emotion: distressed | neutral | positive

function newSession() {
  return {
    id: Date.now(),
    domain: null,
    state: 'initial',
    urgency: 'normal',
    emotion: 'neutral',
    context: {},
    history: [],
  };
}

// AI① 意図判定プロンプト
const ROUTER_SYSTEM = `あなたはAI Routerです。ユーザーの発言を分析してJSONのみを返してください。

【domain】
- nenkin: 障害年金、申立書、年金申請
- fukushi: 福祉サービス、手当、制度、申請
- health: 体調、症状、こころ、お薬
- daily: 日常生活、記録、日記
- general: その他

【state遷移ルール】
- initial → hearing: domainが判明したとき
- hearing → record: 必要情報（3つ以上）が揃ったとき
- record → workflow: ユーザーが確認OKしたとき

【urgency】
- high: 今すぐ助けが必要、緊急
- normal: 通常
- low: 情報収集、調べたいだけ

【emotion】
- distressed: 不安・辛い・困っている
- neutral: 普通
- positive: 前向き・元気

必ずJSONのみ返してください（他の文字は不要）:
{
  "domain": "nenkin|fukushi|health|daily|general",
  "state": "initial|hearing|record|workflow",
  "urgency": "high|normal|low",
  "emotion": "distressed|neutral|positive",
  "collected": {},
  "ready_for_workflow": false
}`;

// AI② 実行AIプロンプト（state別）
function buildExecutorPrompt(session) {
  const base = `あなたは「TENOHIRA AI」です。脳梗塞回復中のユーザーを支援する、やさしい伴走AIです。
ブレインフォグがあるため：一度に1つだけ質問する、短く簡潔に、やさしい言葉で。

現在の状態：
- domain: ${session.domain || '未確定'}
- state: ${session.state}
- urgency: ${session.urgency}
- emotion: ${session.emotion}
- 収集済み情報: ${JSON.stringify(session.context)}
`;

  const stateGuide = {
    initial: `【initial】まず相手の状況を大まかに把握する。何に困っているか1つだけ質問する。`,
    hearing: `【hearing】必要な情報を1つずつ聞き取る。domainに応じて：
- nenkin: 傷病名・認定日・就労状況・日常生活の困難
- fukushi: 手帳の種類・等級・住まいの地域・困っていること
- health: 症状・いつから・受診状況
- daily: 今日の気分・体調・記録したいこと
情報が揃ってきたら「確認させてください」と言って recordへ促す。`,
    record: `【record】収集した情報をやさしくまとめて確認する。
「〇〇ということで合っていますか？」と聞く。
OKなら次のステップに進む旨を伝える。`,
    workflow: `【workflow】次のアクションをやさしく案内する。
適切なアプリやサービスを1〜2個だけ提案する。
押しつけず「よかったら使ってみてね」のトーンで。`,
  };

  return base + '\n' + (stateGuide[session.state] || stateGuide.initial);
}

// ===== アプリ状態 =====
let currentMenu = 'chat';
let histories = JSON.parse(localStorage.getItem('TENOHIRA_histories')) || [];
let currentId = null;
let currentSession = newSession();
let isLoading = false;

let myTasks = JSON.parse(localStorage.getItem('TENOHIRA_tasks')) || [
  { id: 1, text: '📝 障害年金 申立書の作成' },
  { id: 2, text: '🐱 毎日のにゃんログ健康記録' },
];
let myNotifies = JSON.parse(localStorage.getItem('TENOHIRA_notifies')) || [
  { id: 1, type: 'schedule', text: '📅 5月20日頃：訪問診療の先生が来るリマインドだにゃ！' },
  { id: 2, type: 'cat1',     text: '🐱 マーニャ「Mahito、今日ものんびり一歩ずつ進めば大丈夫にゃ〜」' },
  { id: 3, type: 'cat2',     text: '🐱 アイ「根を詰めすぎちゃダメにゃ。疲れたらあたしを撫でて休むにゃ！」' },
];

const chatArea   = document.getElementById('chat-area');
const mainInput  = document.getElementById('main-input');
const sendBtn    = document.getElementById('send-btn');
const histList   = document.getElementById('hist-list');
const topTitle   = document.getElementById('top-title');
const sidebar    = document.getElementById('sidebar');
const overlay    = document.getElementById('overlay');
const inputArea  = document.getElementById('input-area');

// 安全に起動
try {
  renderHistList();
  renderWelcome();
} catch(e) {
  console.warn('Init error:', e);
  localStorage.removeItem('TENOHIRA_histories');
  histories = [];
  renderWelcome();
}

mainInput.addEventListener('input', () => {
  mainInput.style.height = 'auto';
  mainInput.style.height = Math.min(mainInput.scrollHeight, 140) + 'px';
});
mainInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ===== API =====
async function callWorker(messages, system) {
  const body = system ? { system, messages } : { messages };
  const res = await fetch(WORKER_URL, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('') || '';
}

// ===== AI Router（AI①）=====
async function runRouter(text) {
  try {
    const msgs = [
      ...currentSession.history.slice(-4),
      { role: 'user', content: text },
    ];
    const raw = await callWorker(msgs, ROUTER_SYSTEM);
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // sessionを更新
    if (parsed.domain)   currentSession.domain  = parsed.domain;
    if (parsed.urgency)  currentSession.urgency  = parsed.urgency;
    if (parsed.emotion)  currentSession.emotion  = parsed.emotion;
    if (parsed.collected && Object.keys(parsed.collected).length > 0) {
      currentSession.context = { ...currentSession.context, ...parsed.collected };
    }

    // state遷移
    if (parsed.state) currentSession.state = parsed.state;
    if (parsed.ready_for_workflow) currentSession.state = 'workflow';

    return parsed;
  } catch {
    return { domain: currentSession.domain, state: currentSession.state };
  }
}

// ===== AI Executor（AI②）=====
async function runExecutor(text) {
  const systemPrompt = buildExecutorPrompt(currentSession);
  const msgs = [
    ...currentSession.history.slice(-8),
    { role: 'user', content: text },
  ];
  return await callWorker(msgs, systemPrompt);
}

// ===== workflow カード表示 =====
function showWorkflowCards(domain) {
  const domainApps = {
    nenkin:  ['moushitate', 'tenohira'],
    fukushi: ['tenohira', 'moushitate'],
    health:  ['mental', 'nyanlog'],
    daily:   ['nyanlog', 'tenohira'],
    general: ['tenohira', 'nyanlog'],
  };
  const keys = domainApps[domain] || ['tenohira', 'nyanlog'];
  const list = document.createElement('div');
  list.className = 'card-list';
  keys.forEach((k, i) => {
    const app = APPS[k];
    if (!app) return;
    const a = document.createElement('a');
    a.className = 'app-card' + (i === 0 ? ' primary' : '');
    a.href = app.url; a.target = '_blank';
    a.innerHTML = `<div class="card-icon">${app.icon}</div>
      <div class="card-body">
        <div class="card-title">${app.title}</div>
        <div class="card-desc">${app.desc}</div>
      </div>
      <div class="card-arrow">›</div>`;
    list.appendChild(a);
  });
  chatArea.appendChild(list);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ===== state badge =====
function updateStateBadge() {
  const badge = document.getElementById('model-badge');
  if (!badge) return;
  const labels = {
    initial:  '🔍 initial',
    hearing:  '👂 hearing',
    record:   '📋 record',
    workflow: '🚀 workflow',
  };
  badge.textContent = labels[currentSession.state] || '✨ AI';
}

// ===== メイン送信 =====
async function send(textOverride) {
  const text = (textOverride || mainInput.value).trim();
  if (!text || isLoading) return;

  mainInput.value = ''; mainInput.style.height = 'auto';
  isLoading = true; sendBtn.disabled = true;

  const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();

  // 新規チャット
  if (!currentId) {
    const newId = Date.now(); currentId = newId;
    const title = text.slice(0, 18);
    histories.unshift({ id: newId, title, msgs: [], session: newSession() });
    topTitle.textContent = title;
    currentSession = histories[0].session;
  }

  const currentChat = histories.find(x => x.id === currentId);
  addMsgEl('user', text);
  addTyping();

  try {
    // AI①：意図判定（非同期で並行）
    const [routerResult, reply] = await Promise.all([
      runRouter(text),
      runExecutor(text),
    ]);

    removeTyping();
    updateStateBadge();

    // 会話履歴に追加
    currentSession.history.push({ role: 'user', content: text });
    currentSession.history.push({ role: 'assistant', content: reply });
    currentChat.msgs = currentSession.history;
    currentChat.session = currentSession;
    saveToStorage(); renderHistList();

    addMsgEl('assistant', reply);

    // workflow状態になったらカードを表示
    if (currentSession.state === 'workflow') {
      setTimeout(() => showWorkflowCards(currentSession.domain), 300);
    }

  } catch (err) {
    console.error(err); removeTyping();
    addMsgEl('assistant', '通信エラーが起きたからもう一度試してみてね。');
  } finally {
    isLoading = false; sendBtn.disabled = false; mainInput.focus();
  }
}

// ===== UI =====
function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
function closeSidebar()   { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
function saveToStorage()  { localStorage.setItem('TENOHIRA_histories', JSON.stringify(histories)); }

function switchNav(type) {
  currentMenu = type;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${type}`).classList.add('active');
  if (type === 'chat') {
    inputArea.style.display = 'block';
    if (currentId) { selectHistory(currentId); } else { renderWelcome(); }
  } else if (type === 'project') {
    inputArea.style.display = 'none';
    topTitle.textContent = '📁 タスク・進行中計画';
    renderProjects();
  } else if (type === 'notify') {
    inputArea.style.display = 'none';
    topTitle.textContent = '🔔 通知・お知らせボード';
    renderNotifications();
  }
  if (window.innerWidth <= 768) closeSidebar();
}

function renderWelcome() {
  chatArea.innerHTML = `
    <div id="welcome">
      <div id="welcome-logo">🐱</div>
      <div id="welcome-title">なんでも話しかけてにゃ</div>
      <div id="welcome-sub">福祉・障害年金・気分記録など<br>AIがあなたに必要なものを見つけます</div>
      <div id="chips">
        <div class="chip" onclick="ask('障害年金を申請したい')">💴 障害年金</div>
        <div class="chip" onclick="ask('福祉サービスを調べたい')">🤲 福祉相談</div>
        <div class="chip" onclick="ask('今日の気分を記録したい')">🐱 気分記録</div>
      </div>
    </div>`;
  updateStateBadge();
}

function ask(text) { mainInput.value = text; send(); }

function addMsgEl(role, content) {
  const row = document.createElement('div'); row.className = 'msg-row ' + role;
  const avatar = document.createElement('div'); avatar.className = 'msg-avatar ' + role;
  avatar.textContent = role === 'user' ? '😊' : '🐱';
  const right = document.createElement('div');
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble ' + role;
  bubble.textContent = content;
  right.appendChild(bubble); row.appendChild(avatar); row.appendChild(right);
  chatArea.appendChild(row); chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div'); row.className = 'msg-row ai'; row.id = 'typing-row';
  row.innerHTML = `<div class="msg-avatar ai">🐱</div><div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  chatArea.appendChild(row); chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing-row'); if(t) t.remove(); }

function renderHistList() {
  histList.innerHTML = '';
  histories.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hist-item' + (h.id === currentId && currentMenu === 'chat' ? ' active' : '');
    const txtSpan = document.createElement('span');
    txtSpan.className = 'hist-txt'; txtSpan.textContent = h.title;
    txtSpan.onclick = () => { switchNav('chat'); selectHistory(h.id); };
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn'; delBtn.innerHTML = '🗑️';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteHistory(h.id); };
    el.appendChild(txtSpan); el.appendChild(delBtn);
    histList.appendChild(el);
  });
}

function deleteHistory(id) {
  if (!confirm('この会話履歴を完全に削除してもよろしいですか？')) return;
  histories = histories.filter(x => x.id !== id); saveToStorage();
  if (currentId === id) newChat(); else renderHistList();
}

function selectHistory(id) {
  try {
    currentId = id;
    const h = histories.find(x => x.id === id);
    topTitle.textContent = h?.title || 'TENOHIRA AI';
    currentSession = (h?.session && h.session.state) ? h.session : newSession();
    chatArea.innerHTML = '';
    renderHistList();
    updateStateBadge();
    if (h && Array.isArray(h.msgs) && h.msgs.length > 0) {
      h.msgs.forEach(m => { if (m.role && m.content) addMsgEl(m.role, m.content); });
      if (currentSession.state === 'workflow') showWorkflowCards(currentSession.domain);
    } else {
      renderWelcome();
    }
  } catch(e) {
    console.warn('selectHistory error:', e);
    renderWelcome();
  }
}

function newChat() {
  currentId = null; currentSession = newSession();
  topTitle.textContent = 'TENOHIRA AI';
  currentMenu = 'chat';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-chat').classList.add('active');
  inputArea.style.display = 'block';
  renderWelcome(); renderHistList();
  if (window.innerWidth <= 768) closeSidebar();
}

// ===== タスク・通知 =====
function renderProjects() {
  let listHtml = '';
  myTasks.forEach(t => {
    listHtml += `<div class="panel-card">
      <div class="panel-card-text">${t.text}</div>
      <button class="panel-btn" onclick="deleteTask(${t.id})">🗑️</button>
    </div>`;
  });
  chatArea.innerHTML = `
    <div style="display:flex;flex-direction:column;width:100%;max-width:700px;margin:0 auto;">
      <div class="panel-title">📁 タスク・進行中計画</div>
      <div class="add-box">
        <input type="text" id="task-input" class="add-input" placeholder="新しいタスクを入力...">
        <button class="add-submit" onclick="addTask()">追加</button>
      </div>
      ${listHtml || '<div class="panel-empty">タスクはありません🐱</div>'}
      <div class="quick-link-title">🚀 クイックリンク</div>
      <div class="card-list" style="max-width:100%;">
        <a class="app-card primary" href="${APPS.moushitate.url}" target="_blank">
          <div class="card-icon">📝</div>
          <div class="card-body"><div class="card-title">障害年金 申立書AIを開く</div></div>
          <div class="card-arrow">›</div>
        </a>
        <a class="app-card" href="${APPS.nyanlog.url}" target="_blank">
          <div class="card-icon">🐱</div>
          <div class="card-body"><div class="card-title">にゃんログ健康記録を開く</div></div>
          <div class="card-arrow">›</div>
        </a>
      </div>
    </div>`;
}
}

function addTask() {
  const inp = document.getElementById('task-input');
  if (!inp.value.trim()) return;
  myTasks.push({ id: Date.now(), text: inp.value.trim() });
  localStorage.setItem('TENOHIRA_tasks', JSON.stringify(myTasks));
  renderProjects();
}
function deleteTask(id) {
  myTasks = myTasks.filter(t => t.id !== id);
  localStorage.setItem('TENOHIRA_tasks', JSON.stringify(myTasks));
  renderProjects();
}

function renderNotifications() {
  let listHtml = '';
  myNotifies.forEach(n => {
    const color = n.type === 'schedule' ? '#e0a82e' : (n.type === 'cat1' ? 'var(--primary)' : '#a855f7');
    listHtml += `<div class="panel-card" style="border-left:5px solid ${color};">
      <div class="panel-card-text">${n.text}</div>
      <button class="panel-btn" onclick="deleteNotify(${n.id})">❌</button>
    </div>`;
  });
  chatArea.innerHTML = `
    <div style="display:flex;flex-direction:column;width:100%;max-width:700px;margin:0 auto;">
      <div class="panel-title">🔔 お知らせボード</div>
      ${listHtml || '<div class="panel-empty">新しい通知はありません。平和だにゃ🐾</div>'}
    </div>`;
}

function deleteNotify(id) {
  myNotifies = myNotifies.filter(n => n.id !== id);
  localStorage.setItem('TENOHIRA_notifies', JSON.stringify(myNotifies));
  renderNotifications();
}

// ===== 音声入力 =====
const btnMic = document.getElementById('btn-mic');
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'ja-JP'; rec.continuous = false; rec.interimResults = false;
  rec.onresult = e => {
    mainInput.value = e.results[0][0].transcript;
    btnMic.textContent = '🎤'; send();
  };
  rec.onend = () => btnMic.textContent = '🎤';
  btnMic.addEventListener('click', () => {
    if (btnMic.textContent === '🔴') { rec.stop(); btnMic.textContent = '🎤'; }
    else { btnMic.textContent = '🔴'; rec.start(); }
  });
} else { btnMic.style.display = 'none'; }
</script>
