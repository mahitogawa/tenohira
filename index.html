<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="てのひら">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="話しかけるだけ。AIがあなたに必要なものを見つけます。">
<title>てのひら AI</title>
<style>
:root {
  --bg: #1a1a1a;
  --surface: #2a2a2a;
  --surface2: #333333;
  --border: #2a2a2a;
  --border2: #3a3a3a;
  --text: #e0e0e0;
  --text-sub: #a0a0a0;
  --text-dim: #555;
  --primary: #2e9e7c;
  --primary-dark: #1e7a5e;
  --primary-glow: rgba(46,158,124,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
html { font-size: 20px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  position: relative;
}
button { cursor: pointer; font-family: inherit; }

/* スクロールバー */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}
#overlay.show { display: block; }

/* ===== サイドバー ===== */
#sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 260px;
  background: #111;
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  padding-top: env(safe-area-inset-top);
  transform: translateX(-265px);
  transition: transform 0.2s ease-out;
}
#sidebar.open { transform: translateX(0); }

@media (min-width: 641px) {
  #sidebar { position: relative; transform: translateX(0); }
  #overlay.show { display: none; }
}

#sb-header {
  padding: 16px 14px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}
#sb-logo { font-size: 22px; font-weight: 600; color: var(--text); }
.icon-btn {
  background: none;
  border: none;
  color: var(--text-sub);
  font-size: 24px;
  padding: 8px 12px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { background: var(--surface); color: var(--text); }
#sb-nav { padding: 6px 8px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-sub);
}
.nav-item:hover { background: var(--surface); color: var(--text); }

.section-label {
  padding: 20px 16px 10px;
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  font-weight: bold;
  border-top: 0.5px solid var(--border);
  margin-top: 10px;
}

#hist-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.hist-item {
  padding: 14px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-sub);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  /* 長押し時に文字が選択されて青くなるのを防ぐ設定 */
  -webkit-user-select: none;
  user-select: none;
}
.hist-item:hover { background: var(--surface); color: var(--text); }
.hist-item.active { background: var(--surface); color: var(--text); font-weight: 600; border-left: 3px solid var(--primary); }

#sb-footer { padding: 10px 8px; border-top: 0.5px solid var(--border); }
#user-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
#user-name { font-size: 16px; color: #777; flex: 1; }

/* ===== メイン画面 ===== */
#main { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; min-width: 0; }

#top-bar {
  padding-top: calc(12px + env(safe-area-inset-top));
  padding-bottom: 12px;
  padding-left: 14px;
  padding-right: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
#top-title { flex: 1; text-align: center; font-size: 17px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#model-badge { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; padding: 6px 12px; font-size: 13px; color: var(--text-sub); }

#chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

#welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 20px; text-align: center; }
#welcome-logo { font-size: 56px; }
#welcome-title { font-size: 26px; font-weight: 600; }
#welcome-sub { font-size: 18px; color: #666; line-height: 1.7; }
#chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 20px; padding: 12px 22px; font-size: 18px; color: var(--text-sub); cursor: pointer; }

.msg-row { display: flex; gap: 12px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.msg-avatar.ai { background: var(--primary); }
.msg-avatar.user { background: #333; }
.msg-bubble { max-width: 82%; padding: 14px 18px; border-radius: 18px; font-size: 18px; line-height: 1.85; white-space: pre-wrap; word-break: break-word; }
.msg-bubble.ai { background: var(--surface); color: var(--text); border-radius: 4px 12px 12px 12px; }
.msg-bubble.user { background: #2e3a36; color: var(--text); border-radius: 12px 4px 12px 12px; }

.typing-bubble { padding: 12px 16px; border-radius: 4px 12px 12px 12px; background: var(--surface); display: flex; gap: 5px; align-items: center; }
.t-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: tdot 1.2s infinite; }
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

.card-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
.app-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; text-decoration: none; }
.app-card.primary { background: #1a2e26; border: 1.5px solid var(--primary); }
.card-icon { font-size: 32px; flex-shrink: 0; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.card-desc { font-size: 14px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-arrow { color: var(--primary); font-size: 22px; flex-shrink: 0; }

#input-area { padding: 10px 14px 16px; padding-bottom: max(16px, env(safe-area-inset-bottom)); border-top: 0.5px solid var(--border); flex-shrink: 0; }
#input-wrap { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
#main-input { background: none; border: none; outline: none; color: var(--text); font-size: 18px; font-family: inherit; resize: none; line-height: 1.6; width: 100%; max-height: 140px; overflow-y: auto; }
#main-input::placeholder { color: #555; }
#input-actions { display: flex; align-items: center; justify-content: space-between; }
#input-left { display: flex; gap: 6px; align-items: center; }
#input-model { background: var(--bg); border: 0.5px solid #333; border-radius: 10px; padding: 5px 12px; font-size: 13px; color: #555; }
#send-btn { background: var(--primary); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
#send-btn:disabled { background: var(--surface2); cursor: not-allowed; color: #555; }
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sb-header">
    <div id="sb-logo">🐱 てのひら</div>
    <button class="icon-btn" onclick="newChat()" title="新しいチャット">✏️</button>
  </div>
  <div id="sb-nav">
    <div class="nav-item">💬 チャット</div>
    <div class="nav-item">📁 プロジェクト</div>
    <div class="nav-item">🔔 通知</div>
  </div>
  <div class="section-label">最近の会話</div>
  <div id="hist-list"></div>
  <div id="sb-footer">
    <div id="user-row">
      <div class="user-avatar">M</div>
      <div id="user-name">mahitogawa</div>
    </div>
  </div>
</div>

<div id="main">
  <div id="top-bar">
    <button class="icon-btn" onclick="toggleSidebar()">☰</button>
    <div id="top-title">てのひら AI</div>
    <div id="model-badge">✨ Workers AI</div>
  </div>
  <div id="chat-area"></div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="main-input" rows="1" placeholder="なんでも話しかけてにゃ…"></textarea>
      <div id="input-actions">
        <div id="input-left">
          <button class="icon-btn" id="btn-mic" title="音声入力">🎤</button>
          <div id="input-model">てのひら AI</div>
        </div>
        <button id="send-btn" onclick="send()" title="送信">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://tenohira.mahito-ai.workers.dev';

const APPS = {
  tenohira:   { icon:'🤲', title:'てのひら福祉相談',      desc:'福祉サービス・手当・申請についてAIが相談に乗ります',      url:'https://mahitogawa.github.io/tenohira/' },
  moushitate: { icon:'📝', title:'障害年金 申立書AI',      desc:'聞き取りながら、障害年金の申立書を一緒に作ります',        url:'https://mahitogawa.github.io/ai/moushitate-ai.html' },
  nyanlog:    { icon:'🐱', title:'にゃんログ',              desc:'毎日の気分・お薬・症状を記録して受診に活かします',        url:'https://mahitogawa.github.io/nyanlog/' },
  mental:     { icon:'💙', title:'こころのセルフチェック',  desc:'症状から気になる病気を参考表示。AIがやさしく解説します',  url:'https://mahitogawa.github.io/nyanlog/mental.html' },
  passport:   { icon:'📚', title:'生成AIパスポート対策',    desc:'462問の練習問題でAI資格試験を準備します',                url:'https://mahitogawa.github.io/ai/' },
};

const SYSTEM_PROMPT = `あなたは「てのひらAI」です。障害・福祉・行政に詳しい、やさしいAIアシスタントです。簡潔でやさしい言葉で答えてください。`;
const INTENT_PROMPT = `ユーザーの入力から意図を判定してJSONのみ返してください。形式: {"intent":"ID","confidence":0.0~1.0}`;

let histories = JSON.parse(localStorage.getItem('tenohira_histories')) || [
  { id: 1, title: '障害年金の申請について', msgs: [] },
  { id: 2, title: 'にゃんログ 気分記録', msgs: [] },
  { id: 3, title: '自立支援医療について', msgs: [] },
  { id: 4, title: '高次脳機能障害の手帳', msgs: [] }
];
let currentId = null;
let isLoading = false;

// 長押し判定用のタイマー変数
let touchTimer = null;
let isLongTouch = false;

const chatArea = document.getElementById('chat-area');
const mainInput = document.getElementById('main-input');
const sendBtn = document.getElementById('send-btn');
const histList = document.getElementById('hist-list');
const topTitle = document.getElementById('top-title');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

renderHistList();
renderWelcome();

mainInput.addEventListener('input', () => {
  mainInput.style.height = 'auto';
  mainInput.style.height = Math.min(mainInput.scrollHeight, 120) + 'px';
});
mainInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }

function saveToStorage() {
  localStorage.setItem('tenohira_histories', JSON.stringify(histories));
}

// ★メニューリストに長押し（ロングタップ）イベントを組み込む
function renderHistList() {
  histList.innerHTML = '';
  histories.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hist-item' + (h.id === currentId ? ' active' : '');
    el.textContent = h.title;

    // 長押し＆クリックイベント（パソコンとスマホ両対応）
    const startEvent = () => {
      isLongTouch = false;
      touchTimer = setTimeout(() => {
        isLongTouch = true;
        deleteHistory(h.id); // 1秒長押しで削除画面へ
      }, 900);
    };

    const endEvent = () => {
      clearTimeout(touchTimer);
    };

    const clickEvent = () => {
      if (!isLongTouch) {
        selectHistory(h.id); // 長押しされていなければ普通の切り替え
      }
    };

    // スマホ用
    el.addEventListener('touchstart', startEvent);
    el.addEventListener('touchend', endEvent);
    // パソコン用
    el.addEventListener('mousedown', startEvent);
    el.addEventListener('mouseup', endEvent);
    el.addEventListener('mouseleave', endEvent);
    
    el.addEventListener('click', clickEvent);

    histList.appendChild(el);
  });
}

// 長押しされたときに確認ダイアログを出して消す関数
function deleteHistory(id) {
  if (!confirm('この会話履歴を完全に消してもいいですか？')) return;
  
  histories = histories.filter(x => x.id !== id);
  saveToStorage();
  
  if (currentId === id) {
    newChat();
  } else {
    renderHistList();
  }
}

function selectHistory(id) {
  currentId = id;
  const h = histories.find(x => x.id === id);
  topTitle.textContent = h?.title || 'てのひら AI';
  chatArea.innerHTML = '';
  renderHistList();
  
  if (h && h.msgs && h.msgs.length > 0) {
    h.msgs.forEach(m => addMsgEl(m.role, m.content, m.cards));
  } else {
    renderWelcome();
  }
  if (window.innerWidth <= 640) closeSidebar();
}

function newChat() {
  currentId = null;
  topTitle.textContent = 'てのひら AI';
  renderWelcome();
  renderHistList();
  if (window.innerWidth <= 640) closeSidebar();
}

function renderWelcome() {
  chatArea.innerHTML = `
    <div id="welcome">
      <div id="welcome-logo">🐱</div>
      <div id="welcome-title">なんでも話しかけてにゃ</div>
      <div id="welcome-sub">福祉・障害年金・気分記録など<br>AIがあなたに必要なものを見つけます</div>
      <div id="chips">
        <div class="chip" onclick="ask('障害年金を申請したい')">💴 障害年金</div>
        <div class="chip" onclick="ask('福祉サービスを調べたい')">🤲 福祉相談</div>
        <div class="chip" onclick="ask('今日の気分を記録したい')">🐱 気分記録</div>
        <div class="chip" onclick="ask('こころの症状をチェックしたい')">💙 こころチェック</div>
      </div>
    </div>`;
}

function ask(text) { mainInput.value = text; send(); }

function addMsgEl(role, content, cards) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar ' + role;
  avatar.textContent = role === 'user' ? '😊' : '🐱';
  const right = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + role;
  bubble.textContent = content;
  right.appendChild(bubble);
  if (cards && cards.length > 0) {
    const list = document.createElement('div');
    list.className = 'card-list';
    cards.forEach(card => {
      const a = document.createElement('a');
      a.className = 'app-card' + (card.primary ? ' primary' : '');
      a.href = card.url; a.target = '_blank';
      a.innerHTML = `<div class="card-icon">${card.icon}</div><div class="card-body"><div class="card-title">${card.title}</div><div class="card-desc">${card.desc}</div></div><div class="card-arrow">›</div>`;
      list.appendChild(a);
    });
    right.appendChild(list);
  }
  row.appendChild(avatar); row.appendChild(right);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div'); row.className = 'msg-row ai'; row.id = 'typing-row';
  row.innerHTML = `<div class="msg-avatar ai">🐱</div><div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  chatArea.appendChild(row); chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing-row'); if(t) t.remove(); }

async function callWorker(messages, system) {
  const body = system ? { system, messages } : { messages };
  const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('') || '';
}

async function detectIntent(text) {
  try {
    const raw = await callWorker([{ role: 'user', content: INTENT_PROMPT + '\n\nユーザー入力：' + text }], 'JSONルーター');
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch { return { intent: 'general', confidence: 0.5 }; }
}

async function send(textOverride) {
  const text = (textOverride || mainInput.value).trim();
  if (!text || isLoading) return;

  mainInput.value = ''; mainInput.style.height = 'auto';
  isLoading = true; sendBtn.disabled = true;

  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  if (!currentId) {
    const newId = Date.now();
    currentId = newId;
    const title = text.slice(0, 18);
    histories.unshift({ id: newId, title: title, msgs: [] });
    topTitle.textContent = title;
  }

  const currentChat = histories.find(x => x.id === currentId);
  if (!currentChat.msgs) currentChat.msgs = [];
  
  currentChat.msgs.push({ role: 'user', content: text });
  saveToStorage();
  renderHistList();

  addMsgEl('user', text, null);
  addTyping();

  try {
    const intent = await detectIntent(text);
    removeTyping();

    let aiCards = null;
    let aiReply = '';

    if (intent.intent !== 'general' && intent.confidence >= 0.7) {
      const main = APPS[intent.intent];
      aiCards = [
        ...(main ? [{ ...main, primary: true }] : []),
        ...Object.entries(APPS).filter(([k]) => k !== intent.intent).map(([, v]) => ({ ...v, primary: false })),
      ];
      aiReply = `「${text}」についてお手伝いできるアプリを見つけました。`;
      addMsgEl('assistant', aiReply, aiCards);
    } else {
      addTyping();
      const apiMsgs = currentChat.msgs.map(m => ({ role: m.role, content: m.content }));
      aiReply = await callWorker(apiMsgs, SYSTEM_PROMPT);
      removeTyping();
      addMsgEl('assistant', aiReply, null);
    }

    currentChat.msgs.push({ role: 'assistant', content: aiReply, cards: aiCards });
    saveToStorage();

  } catch {
    removeTyping();
    addMsgEl('assistant', 'エラーが発生しました。もう一度お試しください。', null);
  } window.setTimeout(() => {
    isLoading = false; sendBtn.disabled = false; mainInput.focus();
  }, 200);
}

const btnMic = document.getElementById('btn-mic');
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition; const rec = new SR();
  rec.lang = 'ja-JP'; rec.onresult = e => { mainInput.value = e.results[0][0].transcript; send(); };
  btnMic.addEventListener('click', () => { if (btnMic.textContent === '🔴') { rec.stop(); btnMic.textContent = '🎤'; } else { btnMic.textContent = '🔴'; rec.start(); } });
} else { btnMic.style.display = 'none'; }
</script>
</body>
</html>
