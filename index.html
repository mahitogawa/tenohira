<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="てのひら">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="話しかけるだけ。AIがあなたに必要なものを見つけます。">
<title>てのひら AI</title>
<style>
:root {
  --bg: #1a1a1a;
  --surface: #2a2a2a;
  --surface2: #333333;
  --border: #2a2a2a;
  --border2: #3a3a3a;
  --text: #e0e0e0;
  --text-sub: #888;
  --text-dim: #555;
  --primary: #2e9e7c;
  --primary-dark: #1e7a5e;
  --primary-glow: rgba(46,158,124,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  overflow: hidden;
}
button { cursor: pointer; font-family: inherit; }

/* スクロールバー */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* オーバーレイ（モバイル） */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 5;
}

/* ===== サイドバー ===== */
#sidebar {
  width: 240px;
  background: #111;
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.25s ease;
  z-index: 10;
}
#sb-header {
  padding: 14px 12px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}
#sb-logo { font-size: 15px; font-weight: 600; color: var(--text); }
.icon-btn {
  background: none;
  border: none;
  color: var(--text-sub);
  font-size: 16px;
  padding: 4px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}
.icon-btn:hover { background: var(--surface); color: var(--text); }
#sb-nav { padding: 6px 8px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-sub);
  transition: all 0.15s;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.section-label {
  padding: 12px 16px 4px;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  font-weight: 600;
}
#hist-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.hist-item {
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  color: #666;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.15s;
}
.hist-item:hover { background: var(--surface); color: var(--text); }
.hist-item.active { background: var(--surface); color: var(--text); }
#sb-footer {
  padding: 10px 8px;
  border-top: 0.5px solid var(--border);
}
#user-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
}
#user-row:hover { background: var(--surface); }
.user-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
#user-name { font-size: 12px; color: #777; flex: 1; }

/* ===== メイン ===== */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* トップバー */
#top-bar {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
#top-title { flex: 1; text-align: center; font-size: 14px; color: var(--text-sub); }
#model-badge {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-sub);
}

/* チャットエリア */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ウェルカム */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 20px;
  text-align: center;
}
#welcome-logo { font-size: 40px; animation: float 4s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
#welcome-title { font-size: 18px; font-weight: 500; }
#welcome-sub { font-size: 13px; color: #666; line-height: 1.7; }
#chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 16px;
  padding: 7px 14px;
  font-size: 12px;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { border-color: var(--primary); color: var(--text); }

/* メッセージ */
.msg-row { display: flex; gap: 10px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.msg-avatar.ai { background: var(--primary); }
.msg-avatar.user { background: #333; }
.msg-bubble {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-bubble.ai { background: var(--surface); color: var(--text); border-radius: 4px 12px 12px 12px; }
.msg-bubble.user { background: #2e3a36; color: var(--text); border-radius: 12px 4px 12px 12px; }

/* タイピング */
.typing-bubble {
  padding: 12px 16px;
  border-radius: 4px 12px 12px 12px;
  background: var(--surface);
  display: flex; gap: 5px; align-items: center;
}
.t-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
  animation: tdot 1.2s infinite;
}
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

/* カードリスト */
.card-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.app-card {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.app-card:hover { opacity: 0.85; }
.app-card.primary {
  background: #1a2e26;
  border: 1.5px solid var(--primary);
  box-shadow: 0 0 0 1px var(--primary-glow), 0 4px 20px var(--primary-glow);
}
.card-icon { font-size: 24px; flex-shrink: 0; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.card-desc { font-size: 11px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-arrow { color: var(--primary); font-size: 18px; flex-shrink: 0; }

/* 入力エリア */
#input-area {
  padding: 10px 14px 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
}
#input-wrap {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 16px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#input-wrap:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
#main-input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  resize: none;
  line-height: 1.5;
  width: 100%;
  max-height: 120px;
  overflow-y: auto;
}
#main-input::placeholder { color: var(--text-dim); }
#input-actions { display: flex; align-items: center; justify-content: space-between; }
#input-left { display: flex; gap: 6px; align-items: center; }
#input-model { background: var(--bg); border: 0.5px solid #333; border-radius: 10px; padding: 3px 10px; font-size: 11px; color: #555; }
#send-btn {
  background: var(--primary);
  border: none;
  color: #fff;
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: background 0.15s;
  box-shadow: 0 2px 8px var(--primary-glow);
}
#send-btn:hover { background: var(--primary-dark); }
#send-btn:disabled { background: var(--surface2); box-shadow: none; cursor: not-allowed; color: var(--text-dim); }

/* モバイル対応 */
@media (max-width: 640px) {
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
  }
  #sidebar.open { transform: translateX(0); }
  #overlay.show { display: block; }
}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- サイドバー -->
<div id="sidebar">
  <div id="sb-header">
    <div id="sb-logo">🐱 てのひら</div>
    <button class="icon-btn" onclick="newChat()" title="新しいチャット">✏️</button>
  </div>

  <div id="sb-nav">
    <div class="nav-item">💬 チャット</div>
    <div class="nav-item">📁 プロジェクト</div>
    <div class="nav-item">🔔 通知</div>
  </div>

  <div class="section-label">最近の会話</div>
  <div id="hist-list"></div>

  <div id="sb-footer">
    <div id="user-row">
      <div class="user-avatar">M</div>
      <div id="user-name">mahitogawa</div>
      <button class="icon-btn">⚙️</button>
    </div>
  </div>
</div>

<!-- メイン -->
<div id="main">
  <div id="top-bar">
    <button class="icon-btn" onclick="toggleSidebar()">☰</button>
    <div id="top-title">てのひら AI</div>
    <div id="model-badge">✨ Workers AI</div>
  </div>

  <div id="chat-area">
    <!-- ウェルカム画面 -->
    <div id="welcome">
      <div id="welcome-logo">🐱</div>
      <div id="welcome-title">なんでも話しかけてにゃ</div>
      <div id="welcome-sub">福祉・障害年金・気分記録など<br>AIがあなたに必要なものを見つけます</div>
      <div id="chips">
        <div class="chip" onclick="ask('障害年金を申請したい')">💴 障害年金</div>
        <div class="chip" onclick="ask('福祉サービスを調べたい')">🤲 福祉相談</div>
        <div class="chip" onclick="ask('今日の気分を記録したい')">🐱 気分記録</div>
        <div class="chip" onclick="ask('こころの症状をチェックしたい')">💙 こころチェック</div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="main-input" rows="1" placeholder="なんでも話しかけてにゃ…"></textarea>
      <div id="input-actions">
        <div id="input-left">
          <button class="icon-btn" id="btn-mic" title="音声入力">🎤</button>
          <div id="input-model">てのひら AI</div>
        </div>
        <button id="send-btn" onclick="send()" title="送信">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 設定 =====
const WORKER_URL = 'https://tenohira.mahito-ai.workers.dev';

const APPS = {
  tenohira:   { icon:'🤲', title:'てのひら福祉相談',      desc:'福祉サービス・手当・申請についてAIが相談に乗ります',      url:'https://mahitogawa.github.io/tenohira/' },
  moushitate: { icon:'📝', title:'障害年金 申立書AI',      desc:'聞き取りながら、障害年金の申立書を一緒に作ります',        url:'https://mahitogawa.github.io/ai/moushitate-ai.html' },
  nyanlog:    { icon:'🐱', title:'にゃんログ',              desc:'毎日の気分・お薬・症状を記録して受診に活かします',        url:'https://mahitogawa.github.io/nyanlog/' },
  mental:     { icon:'💙', title:'こころのセルフチェック',  desc:'症状から気になる病気を参考表示。AIがやさしく解説します',  url:'https://mahitogawa.github.io/nyanlog/mental.html' },
  passport:   { icon:'📚', title:'生成AIパスポート対策',    desc:'462問の練習問題でAI資格試験を準備します',                url:'https://mahitogawa.github.io/ai/' },
};

const SYSTEM_PROMPT = `あなたは「てのひらAI」です。障害・福祉・行政に詳しい、やさしいAIアシスタントです。
高次脳機能障害、精神障害、身体障害など様々な障害のある方の相談に乗ります。
簡潔でやさしい言葉で答えてください。専門用語は使わず、ブレインフォグがある方にも伝わるように。`;

const INTENT_PROMPT = `ユーザーの入力から意図を判定してJSONのみ返してください。
アプリ: tenohira(福祉相談), moushitate(障害年金申立書), nyanlog(気分記録), mental(こころチェック), passport(AI資格), general(その他)
形式: {"intent":"ID","confidence":0.0~1.0}
他の文字は一切含めないでください。`;

const INITIAL_HISTORIES = [
  { id:1, title:'障害年金の申請について' },
  { id:2, title:'にゃんログ 気分記録' },
  { id:3, title:'自立支援医療について' },
  { id:4, title:'高次脳機能障害の手帳' },
];

// ===== 状態 =====
let messages = [];
let histories = [...INITIAL_HISTORIES];
let currentId = null;
let isLoading = false;
let currentCards = [];

// ===== DOM =====
const chatArea = document.getElementById('chat-area');
const mainInput = document.getElementById('main-input');
const sendBtn = document.getElementById('send-btn');
const histList = document.getElementById('hist-list');
const topTitle = document.getElementById('top-title');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

// ===== 初期化 =====
renderHistList();
mainInput.addEventListener('input', () => {
  mainInput.style.height = 'auto';
  mainInput.style.height = Math.min(mainInput.scrollHeight, 120) + 'px';
});
mainInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ===== サイドバー =====
function toggleSidebar() {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

// ===== 音声入力 =====
const btnMic = document.getElementById('btn-mic');
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'ja-JP'; rec.continuous = false; rec.interimResults = false;
  rec.onresult = e => {
    mainInput.value = e.results[0][0].transcript;
    mainInput.style.height = 'auto';
    mainInput.style.height = Math.min(mainInput.scrollHeight, 120) + 'px';
    btnMic.textContent = '🎤';
    send();
  };
  rec.onend = () => btnMic.textContent = '🎤';
  rec.onerror = () => btnMic.textContent = '🎤';
  btnMic.addEventListener('click', () => {
    if (btnMic.textContent === '🔴') { rec.stop(); btnMic.textContent = '🎤'; }
    else { btnMic.textContent = '🔴'; rec.start(); }
  });
} else { btnMic.style.display = 'none'; }

// ===== API =====
async function callWorker(messages, system) {
  const body = system
    ? { system, messages }
    : { messages };
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('') || '';
}

async function detectIntent(text) {
  try {
    const raw = await callWorker(
      [{ role: 'user', content: INTENT_PROMPT + '\n\nユーザー入力：' + text }],
      'JSONのみ返すルーターです。'
    );
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch {
    return { intent: 'general', confidence: 0.5 };
  }
}

// ===== メッセージ描画 =====
function renderWelcome() {
  chatArea.innerHTML = `
    <div id="welcome">
      <div id="welcome-logo">🐱</div>
      <div id="welcome-title">なんでも話しかけてにゃ</div>
      <div id="welcome-sub">福祉・障害年金・気分記録など<br>AIがあなたに必要なものを見つけます</div>
      <div id="chips">
        <div class="chip" onclick="ask('障害年金を申請したい')">💴 障害年金</div>
        <div class="chip" onclick="ask('福祉サービスを調べたい')">🤲 福祉相談</div>
        <div class="chip" onclick="ask('今日の気分を記録したい')">🐱 気分記録</div>
        <div class="chip" onclick="ask('こころの症状をチェックしたい')">💙 こころチェック</div>
      </div>
    </div>`;
}

function addMsgEl(role, content, cards) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar ' + role;
  avatar.textContent = role === 'user' ? '😊' : '🐱';
  const right = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + role;
  bubble.textContent = content;
  right.appendChild(bubble);
  if (cards && cards.length > 0) {
    const list = document.createElement('div');
    list.className = 'card-list';
    cards.forEach(card => {
      const a = document.createElement('a');
      a.className = 'app-card' + (card.primary ? ' primary' : '');
      a.href = card.url;
      a.target = '_blank';
      a.innerHTML = `<div class="card-icon">${card.icon}</div><div class="card-body"><div class="card-title">${card.title}</div><div class="card-desc">${card.desc}</div></div><div class="card-arrow">›</div>`;
      list.appendChild(a);
    });
    right.appendChild(list);
  }
  row.appendChild(avatar);
  row.appendChild(right);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row ai'; row.id = 'typing-row';
  row.innerHTML = `<div class="msg-avatar ai">🐱</div><div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing-row'); if(t) t.remove(); }

// ===== 履歴 =====
function renderHistList() {
  histList.innerHTML = '';
  histories.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hist-item' + (h.id === currentId ? ' active' : '');
    el.textContent = h.title;
    el.onclick = () => selectHistory(h.id);
    histList.appendChild(el);
  });
}

function selectHistory(id) {
  currentId = id;
  const h = histories.find(x => x.id === id);
  topTitle.textContent = h?.title || 'てのひら AI';
  messages = [];
  chatArea.innerHTML = '';
  renderHistList();
  if (window.innerWidth < 640) closeSidebar();
}

// ===== チャット =====
function newChat() {
  currentId = null;
  messages = [];
  currentCards = [];
  topTitle.textContent = 'てのひら AI';
  renderWelcome();
  renderHistList();
  if (window.innerWidth < 640) closeSidebar();
}

function ask(text) {
  mainInput.value = text;
  send();
}

async function send(textOverride) {
  const text = (textOverride || mainInput.value).trim();
  if (!text || isLoading) return;

  mainInput.value = '';
  mainInput.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  // ウェルカム画面を消してチャット開始
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // 新規履歴に追加
  if (!currentId) {
    const newId = Date.now();
    currentId = newId;
    const title = text.slice(0, 18);
    histories.unshift({ id: newId, title });
    topTitle.textContent = title;
    renderHistList();
  }

  messages.push({ role: 'user', content: text });
  addMsgEl('user', text, null);
  addTyping();

  try {
    // AI① 意図判定
    const intent = await detectIntent(text);
    removeTyping();

    if (intent.intent !== 'general' && intent.confidence >= 0.7) {
      // カード表示
      const main = APPS[intent.intent];
      const cards = [
        ...(main ? [{ ...main, primary: true }] : []),
        ...Object.entries(APPS)
          .filter(([k]) => k !== intent.intent)
          .map(([, v]) => ({ ...v, primary: false })),
      ];
      addMsgEl('assistant', `「${text}」についてお手伝いできるアプリを見つけました。`, cards);
      messages.push({ role: 'assistant', content: `「${text}」についてお手伝いできるアプリを見つけました。` });
    } else {
      // AI② 通常回答
      addTyping();
      const reply = await callWorker(messages, SYSTEM_PROMPT);
      removeTyping();
      addMsgEl('assistant', reply, null);
      messages.push({ role: 'assistant', content: reply });
    }
  } catch {
    removeTyping();
    addMsgEl('assistant', 'エラーが発生しました。もう一度お試しください。', null);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    mainInput.focus();
  }
}
</script>
</body>
</html>
