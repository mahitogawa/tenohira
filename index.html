<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TENOHIRA">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="話しかけるだけ。AIがあなたに必要なものを見つけます。">
<title>TENOHIRA AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Claude風ダークモード */
  --bg: #1a1612;
  --bg2: #221e19;
  --surface: #2a2420;
  --surface2: #312c27;
  --border: #3a342e;
  --border2: #453e37;
  --text: #f0ebe4;
  --text-sub: #9e9188;
  --text-dim: #5a5148;
  --primary: #d4673a;
  --primary-light: #e8896b;
  --primary-bg: #2e1f16;
  --primary-glow: rgba(212,103,58,0.2);
  --sidebar-bg: #1e1a16;
  --danger: #f87171;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
html { font-size: 1rem; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  position: relative;
  font-size: 0.94rem;
}
button { cursor: pointer; font-family: inherit; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(45,40,34,0.4);
  z-index: 99;
  backdrop-filter: blur(2px);
}
#overlay.show { display: block; }

/* ===== サイドバー ===== */
#sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 280px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  padding-top: env(safe-area-inset-top);
  transform: translateX(-285px);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
#sidebar.open { transform: translateX(0); }

@media (min-width: 769px) {
  #sidebar { position: relative; transform: translateX(0); width: 260px; flex-shrink: 0; }
  #overlay.show { display: none; }
}

#sb-header {
  padding: 16px 14px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
#sb-logo {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.02em;
}
#sb-logo .logo-icon {
  width: 28px;
  height: 28px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  color: white;
}

.icon-btn {
  background: none;
  border: none;
  color: var(--text-sub);
  font-size: 1.125rem;
  padding: 6px 8px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.icon-btn:hover { background: var(--border); color: var(--text); }

/* 新規チャットボタン */
#new-chat-btn {
  margin: 10px 12px;
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text-sub);
  font-size: 0.94rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  width: calc(100% - 24px);
}
#new-chat-btn:hover { background: var(--primary-bg); border-color: var(--primary-light); color: var(--primary); }
#new-chat-btn .btn-icon { font-size: 0.875rem; }

#sb-nav { padding: 4px 8px; }
.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-sub);
  font-weight: 500;
  transition: all 0.15s;
}
.nav-item:hover { background: var(--bg2); color: var(--text); }
.nav-item.active { background: var(--primary-bg); color: var(--primary); }

.nav-click-area { display: flex; align-items: center; gap: 8px; flex: 1; height: 100%; }
.nav-emoji { font-size: 0.875rem; }

.add-chat-btn { background: none; border: none; color: var(--text-dim); font-size: 1rem; padding: 2px 8px; border-radius: 6px; }
.add-chat-btn:hover { background: var(--border); color: var(--primary); }

.section-label {
  padding: 16px 14px 6px;
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  font-weight: 700;
  text-transform: uppercase;
}

#hist-list { flex: 1; overflow-y: auto; padding: 2px 8px; }

.hist-item {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.94rem;
  color: var(--text-sub);
  margin-bottom: 2px;
  transition: all 0.15s;
}
.hist-item:hover { background: var(--bg2); color: var(--text); }
.hist-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 600; }
.hist-txt { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 6px; }

.del-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 0.75rem;
  padding: 3px 5px;
  border-radius: 4px;
}
.hist-item:hover .del-btn { display: block; }
.del-btn:hover { color: var(--danger); background: #fee2e2; }

#sb-footer {
  padding: 8px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
#user-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
}
#user-row:hover { background: var(--bg2); }
.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.81rem;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
#user-name { font-size: 0.94rem; color: var(--text-sub); flex: 1; font-weight: 500; }
#user-settings-icon { font-size: 0.875rem; color: var(--text-dim); }

/* ===== メイン画面 ===== */
#main { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; min-width: 0; background: var(--bg); }

#top-bar {
  padding-top: calc(12px + env(safe-area-inset-top));
  padding-bottom: 12px;
  padding-left: 14px;
  padding-right: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
#top-title {
  flex: 1;
  text-align: center;
  font-size: 0.875rem;
  color: var(--text-sub);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 600;
}
#model-badge {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 0.69rem;
  color: var(--text-sub);
  font-weight: 600;
  letter-spacing: 0.02em;
}

#chat-area { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; max-width: 820px; width: 100%; margin: 0 auto; }

/* ===== ウェルカム画面 ===== */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 32px 20px;
  text-align: center;
  width: 100%;
}
#welcome-logo {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  box-shadow: 0 8px 24px var(--primary-glow);
  animation: float 4s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
#welcome-title {
  font-size: 1.375rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: -0.02em;
}
#welcome-sub { font-size: 0.875rem; color: var(--text-sub); line-height: 1.8; }
#chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 420px; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 0.81rem;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  font-weight: 500;
}
.chip:hover { background: var(--primary-bg); border-color: var(--primary-light); color: var(--primary); }
.chip:active { transform: scale(0.97); }

/* ===== メッセージ ===== */
.msg-row { display: flex; gap: 12px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg-avatar.assistant {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  box-shadow: 0 2px 8px var(--primary-glow);
}
.msg-avatar.user { background: var(--border2); }
.msg-bubble {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.875rem;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-bubble.assistant {
  background: #2e2926;
  color: #f0ebe4;
  border-radius: 4px 16px 16px 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.msg-bubble.user {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff;
  border-radius: 16px 4px 16px 16px;
  box-shadow: 0 2px 8px var(--primary-glow);
}

/* タイピング */
.typing-bubble {
  padding: 14px 18px;
  border-radius: 4px 16px 16px 16px;
  background: var(--surface);
  display: flex;
  gap: 5px;
  align-items: center;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.t-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary-light); animation: tdot 1.2s infinite; }
.t-dot:nth-child(2){animation-delay:.2s} .t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

/* ===== カードUI ===== */
.card-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; width: 100%; max-width: 85%; }
.app-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.app-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.app-card:active { transform: scale(0.98); }
.app-card.primary { border: 1.5px solid var(--primary-light); background: var(--primary-bg); }
.card-icon { font-size: 1.625rem; flex-shrink: 0; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 0.875rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.card-desc { font-size: 0.75rem; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-arrow { color: var(--primary); font-size: 1.125rem; flex-shrink: 0; }

/* ===== タスク・通知パネル ===== */
.panel-title { font-size: 1.125rem; font-weight: 700; color: var(--text); margin-bottom: 16px; letter-spacing: -0.02em; }
.panel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 14px 16px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
  width: 100%;
  box-shadow: var(--shadow);
  transition: border-color 0.15s;
}
.panel-card:hover { border-color: var(--border2); }
.panel-card-text { font-size: 0.875rem; font-weight: 500; color: var(--text); flex: 1; line-height: 1.5; }
.panel-btn { background: none; border: none; color: var(--text-dim); font-size: 1rem; padding: 6px; border-radius: 6px; flex-shrink: 0; transition: all 0.15s; }
.panel-btn:hover { color: var(--danger); background: #fee2e2; }
.panel-empty { color: var(--text-dim); font-size: 0.875rem; padding: 24px 0; text-align: center; }

.add-box { display: flex; gap: 8px; margin-bottom: 16px; width: 100%; }
.add-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  padding: 10px 14px;
  font-size: 0.875rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
  box-shadow: var(--shadow);
}
.add-input:focus { border-color: var(--primary-light); }
.add-submit {
  background: var(--primary);
  border: none;
  color: #fff;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.875rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 2px 6px var(--primary-glow);
}
.add-submit:hover { background: var(--primary-light); transform: translateY(-1px); }
.add-submit:active { transform: scale(0.97); }

/* ===== 入力エリア ===== */
#input-area {
  padding: 12px 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
#input-wrap {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: var(--shadow);
  transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 780px;
  margin: 0 auto;
  width: 100%;
}
#input-wrap:focus-within {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px var(--primary-glow), var(--shadow);
}

#main-input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 0.875rem;
  font-family: inherit;
  resize: none;
  line-height: 1.6;
  width: 100%;
  max-height: 120px;
  overflow-y: auto;
}
#main-input::placeholder { color: var(--text-dim); }

#input-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 38px;
}
#input-left { display: flex; gap: 8px; align-items: center; flex: 1; }

#btn-mic {
  width: 36px;
  height: 36px;
  font-size: 1rem;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: background 0.15s;
}
#btn-mic:hover { background: var(--bg2); }

#input-model-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-sub);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  flex-shrink: 0;
  height: 32px;
  transition: all 0.15s;
  font-family: inherit;
}
#input-model-btn:hover { border-color: var(--primary-light); color: var(--primary); background: var(--primary-bg); }

#send-btn {
  background: var(--primary);
  border: none;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.94rem;
  box-shadow: 0 2px 8px var(--primary-glow);
  flex-shrink: 0;
  transition: all 0.15s;
}
#send-btn:hover { background: var(--primary-light); transform: scale(1.05); }
#send-btn:disabled { background: var(--border2); cursor: not-allowed; color: var(--text-dim); box-shadow: none; transform: none; }

/* ===== LINK一覧 ===== */
.links-box { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 640px; margin: 0 auto; padding-bottom: 40px; }
.link-row { display: flex; align-items: center; gap: 8px; }
.link-card {
  flex: 1; display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  text-decoration: none; transition: all 0.2s;
  box-shadow: var(--shadow); min-width: 0;
}
.link-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.link-card:active { transform: scale(0.98); }
.link-featured { border: 1.5px solid var(--primary-light); background: var(--primary-bg); }
.link-icon { font-size: 1.5rem; flex-shrink: 0; }
.link-body { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.link-label { font-size: 0.875rem; font-weight: 700; color: var(--text); }
.link-desc { font-size: 0.75rem; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.link-arrow { color: var(--primary); font-size: 1.125rem; flex-shrink: 0; }
.link-btns { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.link-edit-btn, .link-del-btn { background: none; border: none; font-size: 0.875rem; padding: 5px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
.link-edit-btn:hover { background: var(--bg2); }
.link-del-btn:hover { background: #fee2e2; }

/* ===== 設定画面 ===== */
.settings-box { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
.setting-group {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 14px 16px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: var(--shadow);
}
.setting-label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.setting-desc { font-size: 0.75rem; color: var(--text-dim); }
.setting-field {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 9px 12px;
  font-size: 0.875rem;
  outline: none;
  width: 100%;
  font-family: inherit;
  transition: border-color 0.15s;
}
.setting-field:focus { border-color: var(--primary-light); }
.setting-row { display: flex; gap: 10px; align-items: center; }
.setting-select {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 9px 10px;
  font-size: 0.875rem;
  outline: none;
  font-family: inherit;
  cursor: pointer;
}
</style>
<style id="theme-vars"></style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sb-header">
    <div id="sb-logo" onclick="newChat()" style="cursor:pointer;">
      <div class="logo-icon">🐱</div>
      TENOHIRA
    </div>
  </div>

  <button id="new-chat-btn" onclick="newChat()">
    <span class="btn-icon">✏️</span>
    新しいチャット
  </button>

  <div id="sb-nav">
    <div class="nav-item active" id="nav-chat">
      <div class="nav-click-area" onclick="switchNav('chat')"><span class="nav-emoji">💬</span> チャット</div>
      <button class="add-chat-btn" onclick="newChat()" title="新規">＋</button>
    </div>
    <div class="nav-item" id="nav-project">
      <div class="nav-click-area" onclick="switchNav('project')"><span class="nav-emoji">📋</span> タスク/計画</div>
    </div>
    <div class="nav-item" id="nav-notify">
      <div class="nav-click-area" onclick="switchNav('notify')"><span class="nav-emoji">🔔</span> 通知板</div>
    </div>
    <div class="nav-item" id="nav-links">
      <div class="nav-click-area" onclick="switchNav('links')"><span class="nav-emoji">🔗</span> LINK一覧</div>
    </div>
  </div>

  <div class="section-label">最近の会話</div>
  <div id="hist-list"></div>

  <div id="sb-footer">
    <div id="user-row" onclick="closeSidebar(); switchNav('settings');" title="設定を開く">
      <div class="user-avatar" id="avatar-char">M</div>
      <div id="user-name">mahitogawa</div>
      <span id="user-settings-icon">⚙️</span>
    </div>
  </div>
</div>

<div id="main">
  <div id="top-bar">
    <button class="icon-btn" onclick="toggleSidebar()">☰</button>
    <div id="top-title">TENOHIRA AI</div>
    <div id="model-badge">Workers AI</div>
  </div>
  <div id="chat-area"></div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="main-input" rows="1" placeholder="なんでも話しかけてにゃ…"></textarea>
      <div id="input-actions">
        <div id="input-left">
          <button class="icon-btn" id="btn-mic" title="音声入力">🎤</button>
          <div id="input-model-btn" onclick="switchNav('settings')" title="アプリ設定">⚙️ TENOHIRA</div>
        </div>
        <button id="send-btn" onclick="send()" title="送信">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== JavaScript =====
let config = JSON.parse(localStorage.getItem('TENOHIRA_config')) || {
  userName: 'mahitogawa',
  workerUrl: 'https://tenohira.mahito-ai.workers.dev',
  cat1Msg: '🐱 マーニャ「Mahito、今日ものんびり一歩ずつ進めば大丈夫にゃ〜」',
  cat2Msg: '🐱 アイ「根を詰めすぎちゃダメにゃ。疲れたらあたしを撫でて休むにゃ！」',
  systemPrompt: 'あなたは「TENOHIRA AI」です。脳梗塞回復中のユーザーを支援する、やさしい伴走AIです。\nブレインフォグがあるため：一度に1つだけ質問する、短く簡潔に、やさしい言葉で。',
  themeColor: '#d4673a',
  fontSize: '15px'
};

function applyConfig() {
  const c = config.themeColor;
  const r = parseInt(c.slice(1,3),16);
  const g = parseInt(c.slice(3,5),16);
  const b = parseInt(c.slice(5,7),16);
  const clamp = v => Math.max(0, Math.min(255, v));
  const toHex = (r,g,b) => '#' + [r,g,b].map(v=>clamp(v).toString(16).padStart(2,'0')).join('');
  const light = toHex(r+40, g+30, b+25);
  const bg    = toHex(Math.round(r*0.25), Math.round(g*0.18), Math.round(b*0.15));
  const glow  = `rgba(${r},${g},${b},0.2)`;
  // <style id="theme-vars"> を書き換えて確実に上書き
  const styleEl = document.getElementById('theme-vars');
  if (styleEl) {
    styleEl.textContent = `
      :root {
        --primary: ${c} !important;
        --primary-light: ${light} !important;
        --primary-bg: ${bg} !important;
        --primary-glow: ${glow} !important;
      }
    `;
  }
  // フォントサイズは直接セット（!importantで確実に反映）
  document.documentElement.style.setProperty('font-size', config.fontSize, 'important');
  const nameEl = document.getElementById('user-name');
  if (nameEl) nameEl.textContent = config.userName;
  const avatarEl = document.getElementById('avatar-char');
  if (avatarEl && config.userName) avatarEl.textContent = config.userName.charAt(0).toUpperCase();
}

function previewColor(c) {
  const r = parseInt(c.slice(1,3),16);
  const g = parseInt(c.slice(3,5),16);
  const b = parseInt(c.slice(5,7),16);
  const clamp = v => Math.max(0, Math.min(255, v));
  const toHex = (r,g,b) => '#' + [r,g,b].map(v=>clamp(v).toString(16).padStart(2,'0')).join('');
  const styleEl = document.getElementById('theme-vars');
  if (styleEl) {
    styleEl.textContent = `
      :root {
        --primary: ${c} !important;
        --primary-light: ${toHex(r+40,g+30,b+25)} !important;
        --primary-bg: ${toHex(Math.round(r*0.25),Math.round(g*0.18),Math.round(b*0.15))} !important;
        --primary-glow: rgba(${r},${g},${b},0.2) !important;
      }
    `;
  }
}

const APPS = {
  moushitate: { icon:'📝', title:'障害年金 申立書AI',  desc:'聞き取りながら障害年金の申立書を一緒に作ります', url:'https://mahitogawa.github.io/ai/moushitate-ai.html' },
  nyanlog:    { icon:'🐱', title:'にゃんログ',          desc:'毎日の気分・お薬・症状を記録して受診に活かします', url:'https://mahitogawa.github.io/nyanlog/' },
  tenohira:   { icon:'🤲', title:'てのひら福祉相談',    desc:'福祉サービス・手当・申請についてAIが相談に乗ります', url:'https://mahitogawa.github.io/tenohira/' },
  mental:     { icon:'💙', title:'こころのセルフチェック', desc:'症状から気になる病気を参考表示します', url:'https://mahitogawa.github.io/nyanlog/mental.html' },
  passport:   { icon:'📚', title:'生成AIパスポート対策', desc:'513問の練習問題でAI資格試験を準備します', url:'https://mahitogawa.github.io/ai/' },
};

function newSession() {
  return { id: Date.now(), domain: null, state: 'initial', urgency: 'normal', emotion: 'neutral', context: {}, history: [] };
}

const ROUTER_SYSTEM = `あなたはAI Routerです。ユーザーの発言を分析してJSONのみを返してください。
必ずJSONのみ返してください:
{
  "domain": "nenkin|fukushi|health|daily|general",
  "state": "initial|hearing|record|workflow",
  "urgency": "high|normal|low",
  "emotion": "distressed|neutral|positive",
  "collected": {},
  "ready_for_workflow": false
}`;

function buildExecutorPrompt(session) {
  return config.systemPrompt + `\n\n現在の状態：\n- domain: ${session.domain || '未確定'}\n- state: ${session.state}\n- 収集済み情報: ${JSON.stringify(session.context)}`;
}

let currentMenu = 'chat';
let histories = JSON.parse(localStorage.getItem('TENOHIRA_histories')) || [];
let currentId = null;
let currentSession = newSession();
let isLoading = false;

let myTasks = JSON.parse(localStorage.getItem('TENOHIRA_tasks')) || [
  { id: 1, text: '📝 障害年金 申立書の作成' },
  { id: 2, text: '🐱 毎日のにゃんログ健康記録' },
];

function getNotifies() {
  return [
    { id: 1, type: 'schedule', text: '📅 5月20日頃：訪問診療の先生が来るリマインドだにゃ！' },
    { id: 2, type: 'cat1', text: config.cat1Msg },
    { id: 3, type: 'cat2', text: config.cat2Msg },
  ];
}
let myNotifies = JSON.parse(localStorage.getItem('TENOHIRA_notifies')) || getNotifies();

const chatArea  = document.getElementById('chat-area');
const mainInput = document.getElementById('main-input');
const sendBtn   = document.getElementById('send-btn');
const histList  = document.getElementById('hist-list');
const topTitle  = document.getElementById('top-title');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('overlay');
const inputArea = document.getElementById('input-area');

try {
  const _tv = document.getElementById('theme-vars');
  if (_tv && !_tv.textContent.trim()) {
    _tv.textContent = ':root { --primary: #d4673a; --primary-light: #e8896b; --primary-bg: #2e1f16; --primary-glow: rgba(212,103,58,0.2); }';
  }
  applyConfig();
  renderHistList();
  renderWelcome();
} catch(e) {
  localStorage.removeItem('TENOHIRA_histories');
  histories = [];
  renderWelcome();
}

mainInput.addEventListener('input', () => {
  mainInput.style.height = 'auto';
  mainInput.style.height = Math.min(mainInput.scrollHeight, 120) + 'px';
});
mainInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

async function callWorker(messages, system) {
  const body = system ? { system, messages } : { messages };
  const res = await fetch(config.workerUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('') || '';
}

async function runRouter(text) {
  try {
    const msgs = [...currentSession.history.slice(-4), { role: 'user', content: text }];
    const raw = await callWorker(msgs, ROUTER_SYSTEM);
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    if (parsed.domain) currentSession.domain = parsed.domain;
    if (parsed.state) currentSession.state = parsed.state;
    return parsed;
  } catch {
    return { domain: currentSession.domain, state: currentSession.state };
  }
}

async function runExecutor(text) {
  const systemPrompt = buildExecutorPrompt(currentSession);
  const msgs = [...currentSession.history.slice(-8), { role: 'user', content: text }];
  return await callWorker(msgs, systemPrompt);
}

function showWorkflowCards(domain) {
  const domainApps = { nenkin: ['moushitate', 'tenohira'], fukushi: ['tenohira', 'moushitate'], health: ['mental', 'nyanlog'], daily: ['nyanlog', 'tenohira'] };
  const keys = domainApps[domain] || ['tenohira', 'nyanlog'];
  const list = document.createElement('div');
  list.className = 'card-list';
  keys.forEach((k, i) => {
    const app = APPS[k]; if (!app) return;
    const a = document.createElement('a'); a.className = 'app-card' + (i === 0 ? ' primary' : ''); a.href = app.url; a.target = '_blank';
    a.innerHTML = `<div class="card-icon">${app.icon}</div><div class="card-body"><div class="card-title">${app.title}</div><div class="card-desc">${app.desc}</div></div><div class="card-arrow">›</div>`;
    list.appendChild(a);
  });
  chatArea.appendChild(list); chatArea.scrollTop = chatArea.scrollHeight;
}

function updateStateBadge() {
  const badge = document.getElementById('model-badge'); if (!badge) return;
  const labels = { initial: 'Initial', hearing: 'Hearing', record: 'Record', workflow: 'Workflow' };
  badge.textContent = labels[currentSession.state] || 'Workers AI';
}

async function send(textOverride) {
  const text = (textOverride || mainInput.value).trim(); if (!text || isLoading) return;
  if (!textOverride) { mainInput.value = ''; mainInput.style.height = 'auto'; }
  isLoading = true; sendBtn.disabled = true;
  const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();

  if (!currentId) {
    const newId = Date.now(); currentId = newId; const title = text.slice(0, 20);
    histories.unshift({ id: newId, title, msgs: [], session: newSession() });
    topTitle.textContent = title; currentSession = histories[0].session;
  }

  const currentChat = histories.find(x => x.id === currentId);
  if (!currentChat) { isLoading = false; sendBtn.disabled = false; return; }
  addMsgEl('user', text); addTyping();

  try {
    const routerResult = await runRouter(text);
    const reply = await runExecutor(text);
    removeTyping(); updateStateBadge();
    currentSession.history.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
    currentChat.msgs = currentSession.history; currentChat.session = currentSession;
    saveToStorage(); renderHistList(); addMsgEl('assistant', reply);
    if (currentSession.state === 'workflow') setTimeout(() => showWorkflowCards(currentSession.domain), 300);
  } catch (err) {
    removeTyping(); addMsgEl('assistant', '通信エラーが起きたからもう一度試してみてね。');
  } finally {
    isLoading = false; sendBtn.disabled = false; mainInput.focus();
  }
}

function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
function closeSidebar()   { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
function saveToStorage()  { localStorage.setItem('TENOHIRA_histories', JSON.stringify(histories)); }

function switchNav(type) {
  currentMenu = type;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${type}`);
  if (navEl) navEl.classList.add('active');

  if (type === 'chat') {
    inputArea.style.display = 'block'; if (currentId) { selectHistory(currentId); } else { renderWelcome(); }
  } else if (type === 'project') {
    inputArea.style.display = 'none'; topTitle.textContent = 'タスク・進行中計画'; renderProjects();
  } else if (type === 'notify') {
    inputArea.style.display = 'none'; topTitle.textContent = '通知・お知らせボード'; renderNotifications();
  } else if (type === 'links') {
    inputArea.style.display = 'none'; topTitle.textContent = 'LINK一覧'; renderLinks();
  } else if (type === 'settings') {
    inputArea.style.display = 'none'; topTitle.textContent = 'アプリ設定'; renderSettings();
  }
  if (window.innerWidth <= 768) closeSidebar();
}

function newChat() { currentId = null; currentSession = newSession(); switchNav('chat'); }

function renderWelcome() {
  chatArea.innerHTML = `<div id="welcome">
    <div id="welcome-logo">🐱</div>
    <div id="welcome-title">なんでも話しかけてにゃ</div>
    <div id="welcome-sub">福祉・障害年金・気分記録など<br>AIがあなたに必要なものを見つけます</div>
    <div id="chips">
      <button class="chip" onclick="ask('障害年金を申請したい')">💴 障害年金</button>
      <button class="chip" onclick="ask('福祉サービスを調べたい')">🤲 福祉相談</button>
      <button class="chip" onclick="ask('今日の気分を記録したい')">🐱 気分記録</button>
    </div>
  </div>`;
  updateStateBadge();
}

function ask(text) { send(text); }

function addMsgEl(role, content) {
  const isAI = role === 'assistant';
  const row = document.createElement('div'); row.className = 'msg-row ' + (isAI ? 'assistant' : 'user');
  const avatar = document.createElement('div'); avatar.className = 'msg-avatar ' + (isAI ? 'assistant' : 'user');
  avatar.textContent = isAI ? '🐱' : '😊';
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble ' + (isAI ? 'assistant' : 'user');
  bubble.textContent = content;
  row.appendChild(avatar); row.appendChild(bubble); chatArea.appendChild(row); chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div'); row.className = 'msg-row assistant'; row.id = 'typing-row';
  row.innerHTML = `<div class="msg-avatar assistant">🐱</div><div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  chatArea.appendChild(row); chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing-row'); if(t) t.remove(); }

function renderHistList() {
  histList.innerHTML = '';
  histories.forEach(h => {
    const el = document.createElement('div'); el.className = 'hist-item' + (h.id === currentId && currentMenu === 'chat' ? ' active' : '');
    const txtSpan = document.createElement('span'); txtSpan.className = 'hist-txt'; txtSpan.textContent = h.title;
    txtSpan.onclick = () => { switchNav('chat'); selectHistory(h.id); };
    const delBtn = document.createElement('button'); delBtn.className = 'del-btn'; delBtn.innerHTML = '🗑️';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteHistory(h.id); };
    el.appendChild(txtSpan); el.appendChild(delBtn); histList.appendChild(el);
  });
}

function deleteHistory(id) {
  if (!confirm('この会話履歴を完全に削除しますか？')) return;
  histories = histories.filter(x => x.id !== id); saveToStorage(); if (currentId === id) newChat(); else renderHistList();
}

function selectHistory(id) {
  try {
    currentId = id; const h = histories.find(x => x.id === id); topTitle.textContent = h?.title || 'TENOHIRA AI';
    currentSession = (h?.session && h.session.state) ? h.session : newSession();
    chatArea.innerHTML = ''; renderHistList(); updateStateBadge();
    if (h && Array.isArray(h.msgs) && h.msgs.length > 0) {
      h.msgs.forEach(m => { if (m.role && m.content) addMsgEl(m.role, m.content); });
      if (currentSession.state === 'workflow') showWorkflowCards(currentSession.domain);
    } else { renderWelcome(); }
  } catch(e) { renderWelcome(); }
}

function renderProjects() {
  let listHtml = ''; myTasks.forEach(t => {
    listHtml += `<div class="panel-card"><div class="panel-card-text">${t.text}</div><button class="panel-btn" onclick="deleteTask(${t.id})">🗑️</button></div>`;
  });
  chatArea.innerHTML = `<div style="display:flex;flex-direction:column;width:100%;max-width:640px;margin:0 auto;padding:8px 0;"><div class="panel-title">📋 タスク・進行中計画</div><div class="add-box"><input type="text" id="task-input" class="add-input" placeholder="新しいタスクを入力..."><button class="add-submit" onclick="addTask()">追加</button></div>${listHtml || '<div class="panel-empty">タスクはありません🐱</div>'}</div>`;
}
function addTask() {
  const inp = document.getElementById('task-input'); if (!inp.value.trim()) return;
  myTasks.push({ id: Date.now(), text: inp.value.trim() }); localStorage.setItem('TENOHIRA_tasks', JSON.stringify(myTasks)); renderProjects();
}
function deleteTask(id) {
  myTasks = myTasks.filter(t => t.id !== id); localStorage.setItem('TENOHIRA_tasks', JSON.stringify(myTasks)); renderProjects();
}

function renderNotifications() {
  const stored = localStorage.getItem('TENOHIRA_notifies');
  myNotifies = stored ? JSON.parse(stored) : getNotifies();
  if (!stored) localStorage.setItem('TENOHIRA_notifies', JSON.stringify(myNotifies));
  let listHtml = '';
  myNotifies.forEach(n => {
    const color = n.type === 'schedule' ? '#e0a82e' : (n.type === 'cat1' ? 'var(--primary)' : '#a855f7');
    listHtml += `<div class="panel-card" style="border-left:4px solid ${color};"><div class="panel-card-text">${n.text}</div><button class="panel-btn" onclick="deleteNotify(${n.id})">❌</button></div>`;
  });
  chatArea.innerHTML = `<div style="display:flex;flex-direction:column;width:100%;max-width:640px;margin:0 auto;padding:8px 0;"><div class="panel-title">🔔 お知らせボード</div>${listHtml || '<div class="panel-empty">新しい通知はありません🐾</div>'}</div>`;
}
function deleteNotify(id) {
  let stored = myNotifies.filter(n => n.id !== id);
  myNotifies = stored;
  localStorage.setItem('TENOHIRA_notifies', JSON.stringify(stored)); renderNotifications();
}

const DEFAULT_LINKS = [
  { id: 1, icon: '🤖', label: 'AI・ツール集',    url: 'https://mahitogawa.github.io/ai',       desc: '生成AIパスポート・AIツール集' },
  { id: 2, icon: '💴', label: '家計簿',          url: 'https://mahitogawa.github.io/kakeibo',  desc: '家計簿アプリ' },
  { id: 3, icon: '🐱', label: 'にゃんログ',      url: 'https://mahitogawa.github.io/nyanlog',  desc: '気分・健康記録', featured: true },
  { id: 4, icon: '🤲', label: 'てのひら',        url: 'https://mahitogawa.github.io/tenohira', desc: '福祉相談AI' },
  { id: 5, icon: '📝', label: '原稿AI',          url: 'https://mahitogawa.github.io/gennai',   desc: '原稿・申立書AI' },
];
function loadLinks() { return JSON.parse(localStorage.getItem('TENOHIRA_links')) || DEFAULT_LINKS; }
function saveLinks(links) { localStorage.setItem('TENOHIRA_links', JSON.stringify(links)); }

function renderLinks() {
  const links = loadLinks();
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const cards = links.map(l => `
    <div class="link-row">
      <a class="link-card${l.featured ? ' link-featured' : ''}" href="${esc(l.url)}" target="_blank" rel="noopener">
        <span class="link-icon">${esc(l.icon)}</span>
        <span class="link-body">
          <span class="link-label">${esc(l.label)}</span>
          <span class="link-desc">${esc(l.desc)}</span>
        </span>
        <span class="link-arrow">›</span>
      </a>
      <div class="link-btns">
        <button class="link-edit-btn" onclick="editLink(${l.id})" title="編集">✏️</button>
        <button class="link-del-btn" onclick="deleteLink(${l.id})" title="削除">🗑️</button>
      </div>
    </div>`).join('');
  chatArea.innerHTML = `<div class="links-box"><div class="panel-title">🔗 LINK一覧</div>${cards || '<div class="panel-empty">リンクがありません🐾</div>'}<button class="add-submit" style="margin-top:8px;" onclick="addLinkForm()">＋ リンクを追加</button></div>`;
}

function addLinkForm(prefill) {
  const l = prefill || { id: null, icon: '🔗', label: '', url: 'https://mahitogawa.github.io/', desc: '', featured: false };
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  chatArea.innerHTML = `
    <div class="links-box">
      <div class="panel-title">${l.id ? '✏️ リンクを編集' : '➕ リンクを追加'}</div>
      <div class="setting-group"><div class="setting-label">アイコン（絵文字）</div><input id="lf-icon" class="setting-field" value="${esc(l.icon)}" maxlength="4" style="width:80px;"></div>
      <div class="setting-group"><div class="setting-label">ラベル（名前）</div><input id="lf-label" class="setting-field" value="${esc(l.label)}" placeholder="にゃんログ"></div>
      <div class="setting-group"><div class="setting-label">URL</div><input id="lf-url" class="setting-field" value="${esc(l.url)}"></div>
      <div class="setting-group"><div class="setting-label">説明</div><input id="lf-desc" class="setting-field" value="${esc(l.desc)}" placeholder="ひとことメモ"></div>
      <div class="setting-group" style="flex-direction:row;align-items:center;gap:12px;">
        <input type="checkbox" id="lf-featured" ${l.featured ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer;accent-color:var(--primary);">
        <label for="lf-featured" class="setting-label" style="cursor:pointer;text-transform:none;font-size:0.875rem;">おすすめ表示（オレンジ枠）</label>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="add-submit" style="flex:1;" onclick="saveLinkForm(${l.id || 'null'})">保存する🐾</button>
        <button class="add-submit" style="flex:1;background:var(--border2);color:var(--text-sub);box-shadow:none;" onclick="renderLinks()">キャンセル</button>
      </div>
    </div>`;
}

function saveLinkForm(id) {
  const icon  = document.getElementById('lf-icon').value.trim()  || '🔗';
  const label = document.getElementById('lf-label').value.trim();
  const url   = document.getElementById('lf-url').value.trim();
  const desc  = document.getElementById('lf-desc').value.trim();
  const featured = document.getElementById('lf-featured').checked;
  if (!label || !url) { alert('ラベルとURLは必須にゃ🐾'); return; }
  let links = loadLinks();
  if (id) { links = links.map(l => l.id === id ? { ...l, icon, label, url, desc, featured } : l); }
  else { links.push({ id: Date.now(), icon, label, url, desc, featured }); }
  saveLinks(links); renderLinks();
}
function editLink(id) { const l = loadLinks().find(l => l.id === id); if (l) addLinkForm(l); }
function deleteLink(id) { if (!confirm('このリンクを削除しますか？')) return; saveLinks(loadLinks().filter(l => l.id !== id)); renderLinks(); }

  config.fontSize    = document.getElementById('cfg-fontsize').value;
  localStorage.setItem('TENOHIRA_config', JSON.stringify(config));
  let storedNotifies = JSON.parse(localStorage.getItem('TENOHIRA_notifies'));

// ===== スワイプでサイドバー開閉 =====
(function() {
  let startX = 0, startY = 0, isDragging = false;
  const EDGE = 30;      // 画面左端からこのpx以内でスワイプ開始→開く
  const THRESHOLD = 60; // このpx以上スワイプで確定

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!isDragging) {
      const dx = e.touches[0].clientX - startX;
      const dy = Math.abs(e.touches[0].clientY - startY);
      // 横方向が主体のスワイプだけ処理
      if (Math.abs(dx) > dy && Math.abs(dx) > 8) isDragging = true;
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!isDragging) return;
    const dx = e.changedTouches[0].clientX - startX;
    const isSidebarOpen = sidebar.classList.contains('open');

    // 左端から右スワイプ → 開く
    if (!isSidebarOpen && startX < EDGE && dx > THRESHOLD) {
      sidebar.classList.add('open');
      overlay.classList.add('show');
    }
    // 開いてる状態で左スワイプ → 閉じる
    if (isSidebarOpen && dx < -THRESHOLD) {
      closeSidebar();
    }
    isDragging = false;
  }, { passive: true });
})();

// 音声入力
const btnMic = document.getElementById('btn-mic');
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'ja-JP'; rec.continuous = false; rec.interimResults = false;
  rec.onresult = e => { const t = e.results[0][0].transcript; mainInput.value = t; btnMic.textContent = '🎤'; send(t); };
  rec.onend = () => btnMic.textContent = '🎤';
  rec.onerror = () => btnMic.textContent = '🎤';
  btnMic.addEventListener('click', () => {
    if (btnMic.textContent === '🎤') { rec.start(); btnMic.textContent = '🛑'; }
    else { rec.stop(); btnMic.textContent = '🎤'; }
  });
}
